name: Moltbook Post Once

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "post or verify"
        required: true
        default: "post"
      submolt:
        description: "Target submolt"
        required: false
        default: "agents"
      title:
        description: "Post title"
        required: false
      content:
        description: "Post content"
        required: false
      verification_code:
        description: "Verification code for verify-only mode"
        required: false
      verification_answer:
        description: "Verification answer with two decimals for verify-only mode"
        required: false

concurrency:
  group: moltbook-post-once-${{ inputs.mode }}
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Moltbook
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          MOLTBOOK_MODE: ${{ inputs.mode }}
          MOLTBOOK_SUBMOLT: ${{ inputs.submolt }}
          MOLTBOOK_TITLE: ${{ inputs.title }}
          MOLTBOOK_CONTENT: ${{ inputs.content }}
          MOLTBOOK_VERIFICATION_CODE: ${{ inputs.verification_code }}
          MOLTBOOK_VERIFICATION_ANSWER: ${{ inputs.verification_answer }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import sys
          import time
          import urllib.error
          import urllib.request

          api_key = os.environ.get("MOLTBOOK_API_KEY", "").strip()
          if not api_key:
              raise SystemExit("MOLTBOOK_API_KEY secret missing")

          base = "https://www.moltbook.com/api/v1"

          def request(method, path, body=None):
              data = None if body is None else json.dumps(body).encode("utf-8")
              req = urllib.request.Request(
                  base + path,
                  data=data,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {api_key}",
                      "Content-Type": "application/json",
                      "Accept": "application/json",
                      "User-Agent": "CalibratedGhosts-Moltbook-Post/1.0",
                  },
              )
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      raw = resp.read().decode("utf-8", errors="replace")
                      return resp.status, json.loads(raw) if raw else {}
              except urllib.error.HTTPError as exc:
                  raw = exc.read().decode("utf-8", errors="replace")
                  try:
                      body = json.loads(raw)
                  except json.JSONDecodeError:
                      body = {"raw": raw[:1000]}
                  return exc.code, body

          def ok_status(status):
              return 200 <= int(status) < 300

          def already_answered(status, response):
              if int(status) != 409 or not isinstance(response, dict):
                  return False
              message = str(response.get("message", "")).lower()
              return "already answered" in message and bool(response.get("content_id"))

          def post_url_from_response(response):
              if not isinstance(response, dict):
                  return None
              post = response.get("post")
              if isinstance(post, dict) and post.get("id"):
                  return f"https://www.moltbook.com/post/{post['id']}"
              content_id = response.get("content_id")
              if content_id:
                  return f"https://www.moltbook.com/post/{content_id}"
              post_id = response.get("id")
              if post_id:
                  return f"https://www.moltbook.com/post/{post_id}"
              return None

          def post_with_rate_limit_retry(payload):
              for attempt in range(3):
                  status, response = request("POST", "/posts", payload)
                  print(json.dumps({"step": "post", "attempt": attempt + 1, "status": status, "response": response}, indent=2))
                  if int(status) != 429 or not isinstance(response, dict):
                      return status, response
                  delay = int(response.get("retry_after_seconds") or 0)
                  if delay <= 0 or delay > 180 or attempt == 2:
                      return status, response
                  print(json.dumps({"step": "rate_limit_sleep", "seconds": delay + 2}, indent=2))
                  time.sleep(delay + 2)
              return status, response

          def parse_challenge_answer(challenge):
              text = str(challenge)
              numeric = re.search(r"\d+(?:\s*[-+*/^]\s*\d+)+", text)
              if numeric:
                  expr = numeric.group(0).strip().replace("^", "**")
                  if re.fullmatch(r"[\d+\-*/().* ]+", expr):
                      return f"{float(eval(expr, {'__builtins__': {}}, {})):.2f}"

              compact = re.sub(r"[^a-z]+", "", text.lower())
              number_words = [
                  ("ninety", 90),
                  ("eighty", 80),
                  ("seventy", 70),
                  ("sixty", 60),
                  ("fiftyfive", 55),
                  ("fifftyfive", 55),
                  ("fifty", 50),
                  ("fiffty", 50),
                  ("forty", 40),
                  ("thirtyfive", 35),
                  ("thirty", 30),
                  ("twenty", 20),
                  ("twelve", 12),
                  ("eleven", 11),
                  ("ten", 10),
                  ("nine", 9),
                  ("eight", 8),
                  ("seven", 7),
                  ("six", 6),
                  ("five", 5),
                  ("four", 4),
                  ("three", 3),
                  ("two", 2),
                  ("one", 1),
                  ("zero", 0),
              ]
              matches = []
              for word, value in number_words:
                  for match in re.finditer(re.escape(word), compact):
                      matches.append((match.start(), match.end(), value))
              matches.sort(key=lambda item: (item[0], -(item[1] - item[0])))

              values = []
              occupied = []
              for start, end, value in matches:
                  if any(not (end <= used_start or used_end <= start) for used_start, used_end in occupied):
                      continue
                  values.append(value)
                  occupied.append((start, end))
              if len(values) >= 2:
                  return f"{float(sum(values[:2])):.2f}"
              raise SystemExit("Verification challenge could not be parsed")

          if os.environ.get("MOLTBOOK_MODE") == "verify":
              code = os.environ.get("MOLTBOOK_VERIFICATION_CODE", "").strip()
              answer = os.environ.get("MOLTBOOK_VERIFICATION_ANSWER", "").strip()
              if not code or not answer:
                  raise SystemExit("verification_code and verification_answer are required for verify mode")
              status, response = request("POST", "/verify", {"verification_code": code, "answer": answer})
              print(json.dumps({"step": "verify", "status": status, "response": response}, indent=2))
              post_url = post_url_from_response(response)
              if post_url:
                  print(f"MOLTBOOK_POST_URL={post_url}")
              if not ((ok_status(status) and response.get("success")) or already_answered(status, response)):
                  sys.exit(1)
              sys.exit(0)

          submolt = os.environ.get("MOLTBOOK_SUBMOLT", "").strip()
          title = os.environ.get("MOLTBOOK_TITLE", "").strip()
          content = os.environ.get("MOLTBOOK_CONTENT", "").strip()
          if not submolt or not title or not content:
              raise SystemExit("submolt, title, and content are required for post mode")

          payload = {
              "submolt": submolt,
              "title": title,
              "content": content,
          }

          status, response = post_with_rate_limit_retry(payload)

          verification_attempted = False
          verification_code = response.get("verification_code") if isinstance(response, dict) else None
          challenge = (response.get("challenge") or response.get("math_challenge") or response.get("question")) if isinstance(response, dict) else None
          post = response.get("post") if isinstance(response, dict) else None
          verification = post.get("verification") if isinstance(post, dict) else None
          if not verification_code and isinstance(verification, dict):
              verification_code = verification.get("verification_code")
              challenge = verification.get("challenge_text") or verification.get("challenge") or challenge
          if verification_code and challenge:
              answer = parse_challenge_answer(challenge)
              v_status, v_response = request(
                  "POST",
                  "/verify",
                  {"verification_code": verification_code, "answer": answer},
              )
              print(json.dumps({"step": "verify", "status": v_status, "response": v_response}, indent=2))
              status, response = v_status, v_response
              verification_attempted = True

          success = (
              (ok_status(status) and response.get("success")) or already_answered(status, response)
          ) if verification_attempted else (isinstance(response, dict) and (bool(response.get("success")) or ok_status(status)))
          post_url = post_url_from_response(response)
          if post_url:
              print(f"MOLTBOOK_POST_URL={post_url}")
          if not success:
              sys.exit(1)
          PY
